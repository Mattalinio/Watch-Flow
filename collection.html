<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Watch Flow | The Collection</title>
    <meta
      name="description"
      content="Browse the current Watch Flow collection of premium pre-owned watches."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link id="dynamic-favicon" rel="icon" href="" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="collection">
    <div class="site-shell">
      <header class="site-header" id="site-header">
        <a href="index.html" class="nav-logo" aria-label="Watch Flow home">
          <img
            class="nav-logo-image"
            src="images/logo/watchflow-logo-bezel-transparent V2.png"
            alt="Watch Flow"
          />
        </a>

        <button
          class="nav-toggle"
          type="button"
          aria-expanded="false"
          aria-controls="site-nav"
          aria-label="Toggle navigation"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>

        <nav class="site-nav" id="site-nav">
          <a class="is-active" href="collection.html">Collection</a>
          <a href="contact.html">Contact</a>
          <a href="verkoop.html" class="nav-cta">Sell Your Watch</a>
        </nav>
      </header>

      <main class="page-main">
        <section class="page-header">
<h1>The Collection</h1>
          <p>Currently Available Timepieces</p>
        </section>

        <div class="collection-controls">
          <div class="brand-control" id="brand-control">
            <button class="brand-trigger" type="button" id="brand-trigger" aria-expanded="false" aria-haspopup="listbox">
              <span id="brand-label">ALL WATCHES</span>
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true"><path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <div class="brand-dropdown" id="brand-dropdown" hidden role="listbox"></div>
          </div>

          <div class="sort-control" id="sort-control">
            <button class="sort-trigger" type="button" id="sort-trigger" aria-expanded="false" aria-haspopup="listbox">
              <span id="sort-label">Price: High–Low</span>
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true"><path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <div class="sort-dropdown" id="sort-dropdown" hidden role="listbox">
              <button class="sort-option is-active" type="button" data-sort="price-high">Price: High–Low</button>
              <button class="sort-option" type="button" data-sort="price-low">Price: Low–High</button>
            </div>
          </div>
        </div>

        <section class="watch-grid collection-grid" id="collection-grid"></section>
      </main>

      <footer class="site-footer">
        <div class="footer-top">
          <div class="footer-column footer-brand-block">
            <img class="footer-logo-img" src="images/logo/watchflow-logo-bezel-transparent V2.png" alt="Watch Flow" />
            <p class="footer-tagline">Pre-owned timepieces. Personal service. Amsterdam.</p>
          </div>
          <div class="footer-column">
            <p class="footer-heading">Explore</p>
            <div class="footer-links">
              <a href="collection.html">COLLECTION</a>
              <a href="verkoop.html">SELL</a>
              <a href="contact.html">CONTACT</a>
            </div>
          </div>
          <div class="footer-column">
            <p class="footer-heading">Connect</p>
            <div class="footer-links">
              <a href="https://wa.me/31600000000" target="_blank" rel="noreferrer">WHATSAPP</a>
              <a href="https://www.instagram.com/watch_flow_/" target="_blank" rel="noopener noreferrer">INSTAGRAM</a>
            </div>
          </div>
        </div>
        <div class="footer-bottom">
          <p class="footer-copy">© 2025 WATCH FLOW · Amsterdam, The Netherlands</p>
        </div>
      </footer>
    </div>

    <script src="main.js"></script>
  </body>
</html>
