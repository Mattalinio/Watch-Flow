<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopify API Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #0A0E14;
            color: white;
        }
        button {
            background: #88CDF6;
            color: #0A0E14;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
        }
        #result {
            margin-top: 20px;
            padding: 20px;
            background: #1a1f2e;
            border-radius: 4px;
            white-space: pre-wrap;
        }
        .error {
            color: #ff6b6b;
        }
        .success {
            color: #51cf66;
        }
    </style>
</head>
<body>
    <h1>Shopify API Test</h1>
    <button onclick="testAPI()">Test Shopify Connection</button>
    <div id="result">Click button to test...</div>

    <script>
        const SHOP = 'watch-flow-7721.myshopify.com';
        const TOKEN = 'PLACE_TOKEN_HERE'; // Never commit real tokens to git

        async function testAPI() {
            const resultDiv = document.getElementById('result');
            resultDiv = 'Testing connection...';

            try {
                const query = `{
                    products(first: 5) {
                        edges {
                            node {
                                id
                                title
                                priceRange {
                                    minVariantPrice {
                                        amount
                                    }
                                }
                            }
                        }
                    }
                }`;

                const response = await fetch(`https://${SHOP}/admin/api/2024-04/graphql.json`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Shopify-Access-Token': TOKEN
                    },
                    body: JSON.stringify({ query })
                });

                const data = await response.json();

                if (data.errors) {
                    resultDiv.innerHTML = `<span class="error">ERROR:\n${JSON.stringify(data.errors, null, 2)}</span>`;
                } else {
                    resultDiv.innerHTML = `<span class="success">SUCCESS! Products found:\n${JSON.stringify(data, null, 2)}</span>`;
                }

            } catch (error) {
                resultDiv.innerHTML = `<span class="error">ERROR: ${error.message}</span>`;
            }
        }
    </script>
</body>
</html>
